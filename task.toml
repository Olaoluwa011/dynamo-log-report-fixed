schema_version = "1.3"
artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON summary report."
keywords = ["python", "json", "log-parsing"]

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["generated_output_artifact", "json"]
expert_time_estimate_hours = 0.3
difficulty_explanation = "Parse a small access log and emit exact summary statistics in JSON."
solution_explanation = "Read each non-empty log entry, count requests and distinct client IPs, count requested paths, and write the required JSON object."
verification_explanation = "Parse the submitted JSON artifact and verify its exact keys, value types, and values against independently computed expectations."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
network_mode = "no-network"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
